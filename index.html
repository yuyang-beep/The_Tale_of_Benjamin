<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>本杰明往事</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="app">

    <!-- ── LOBBY ── -->
    <div id="screen-lobby" class="screen active">

      <div class="lore-hero">
        <h1 class="title">本杰明往事</h1>
        <p class="subtitle">The Tale of Benjamin</p>
        <div class="lore-poem">
          <p>当你向前走向未来时，</p>
          <p>有人正在从未来退回过去。</p>
          <p>你们站在同一个瞬间，</p>
          <p>却看见完全不同的时间。</p>
        </div>
        <p class="lore-call">而今晚，你们在同一段时间相遇。</p>
      </div>

      <div class="lore-sep">── ✦ ──</div>

      <label class="field-label">你的名字</label>
      <input id="inp-name" type="text" placeholder="在命运之网中留下你的名字" maxlength="12" autocomplete="off"/>

      <div class="lobby-actions">
        <div class="lobby-card">
          <p class="lobby-card-title">新建房间</p>
          <p class="lobby-card-desc">创建一局，把房间码分享给同伴</p>
          <button id="btn-create">创建房间</button>
        </div>
        <div class="lobby-divider">或</div>
        <div class="lobby-card">
          <p class="lobby-card-title">加入房间</p>
          <p class="lobby-card-desc">输入同伴的房间码，加入同一段命运</p>
          <input id="inp-room" type="text" placeholder="房间码 XXXX" maxlength="4" autocomplete="off"/>
          <button id="btn-join">加入房间</button>
        </div>
      </div>

      <div id="lobby-error" class="error"></div>
    </div>

    <!-- ── WAITING ROOM ── -->
    <div id="screen-waiting" class="screen">
      <h2>等待开始</h2>
      <p>房间码：<span id="room-code" class="code"></span></p>
      <div id="player-list" class="player-list"></div>
      <button id="btn-start" class="hidden">开始游戏</button>
      <p id="wait-hint" class="hint"></p>
    </div>

    <!-- ── GAME ── -->
    <div id="screen-game" class="screen">
      <header class="game-header">
        <span id="hdr-round">第 1 轮</span>
        <span id="hdr-phase">自由阶段</span>
        <span id="hdr-identity"></span>
      </header>
      <div id="hdr-timeline"></div>

      <!-- Free phase -->
      <div id="panel-free" class="panel hidden">
        <p class="hint">自由交流阶段 — 金币不可交易</p>
        <button id="btn-end-free" class="hidden">结束交流，进入行动</button>
      </div>

      <!-- Action phase -->
      <div id="panel-action" class="panel hidden">
        <div id="coin-status"></div>
        <div id="action-controls"></div>
        <p id="action-wait" class="hint hidden">等待其他玩家行动…</p>
      </div>

      <!-- Guess phase -->
      <div id="panel-guess" class="panel hidden">
        <div id="guess-controls"></div>
        <p id="guess-wait" class="hint hidden">等待其他玩家猜测…</p>
      </div>

      <!-- Settlement phase -->
      <div id="panel-settlement" class="panel hidden">
        <h3>本轮结算</h3>
        <div id="settlement-info"></div>
        <div id="leaderboard"></div>
        <button id="btn-next-round" class="hidden">下一轮</button>
      </div>

      <!-- Ended -->
      <div id="panel-ended" class="panel hidden">
        <h2 class="ended-title">命运落定</h2>
        <div id="final-scores"></div>
        <p id="benjamin-reveal"></p>
      </div>
    </div>
  </div>

  <!-- Reconnecting banner -->
  <div id="reconnect-banner" class="hidden" style="
    position:fixed;top:0;left:0;right:0;
    background:#7a6530;color:#fff;
    text-align:center;padding:.5rem;font-size:.9rem;z-index:999;">
    网络断开，正在重连…
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
